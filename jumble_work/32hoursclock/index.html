<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>32時間時計</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="main-display">
            <div class="label">32時間時計</div>
            <div id="main-special-clock" class="time-large">00:00:00</div>
        </main>
        
        <footer class="sub-display">
            <div class="sub-item">
                <div class="label">通常時刻 (JST)</div>
                <div id="sub-normal-clock" class="time-small">00:00:00</div>
            </div>
            <div class="sub-item">
                <div class="label">32時間時計</div>
                <div id="sub-special-clock" class="time-small">00:00:00</div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
